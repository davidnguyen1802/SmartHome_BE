spring:
  application:
    name: SmartHome

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
        ddl-auto: update
    properties:
        hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect


server:
  address: 0.0.0.0
  compression:
    enabled: false

jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
