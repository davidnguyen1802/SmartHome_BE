spring:
  application:
    name: SmartHome

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
        ddl-auto: none
    properties:
        hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect


server:
  address: 0.0.0.0
  compression:
    enabled: false

jwt:
    secret: ${JWT_SECRET:${JWT_SECRET_KEY}}
    expiration: 86400000
    refresh-expiration: 604800000

auth:
  seed:
    enabled: true
    username: ${AUTH_SEED_USERNAME:admin}
    password: ${AUTH_SEED_PASSWORD:admin123}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

adafruit:
  io:
    username: ${ADAFRUIT_IO_USERNAME}
    key: ${ADAFRUIT_IO_KEY}
    mqtt-broker-url: ssl://io.adafruit.com:8883
    sensor-topics:
      - ${ADAFRUIT_IO_USERNAME}/feeds/bbc-temp
      - ${ADAFRUIT_IO_USERNAME}/feeds/bbc-humi
      - ${ADAFRUIT_IO_USERNAME}/feeds/bbc-light
      - ${ADAFRUIT_IO_USERNAME}/feeds/bbc-pir
    led-topic: ${ADAFRUIT_IO_USERNAME}/feeds/bbc-led
    fan-topic: ${ADAFRUIT_IO_USERNAME}/feeds/bbc-fan

dashboard:
  realtime:
    enabled: true
    emitter-timeout-ms: 0
    heartbeat-interval-ms: 15000

